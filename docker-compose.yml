services:
  auth-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    container_name: iot-auth-service
    restart: unless-stopped
    ports:
      - "9090:9090"

  monitor-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: iot-monitor-server
    restart: unless-stopped
    depends_on:
      - auth-service
    environment:
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: "9090"
    ports:
      - "5000:5000"
      - "8081:8081"

  sensor-client:
    build:
      context: .
      dockerfile: docker/Dockerfile.sensors
    container_name: iot-sensor-client
    restart: unless-stopped
    depends_on:
      - monitor-server
    environment:
      SERVER_HOST: monitor-server
      SERVER_PORT: "5000"
      SEND_INTERVAL: "5"
      BATCH_SIZE: "3"
